<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Hiro Marker</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
    <a-assets>
      <a-asset-item id="boxModel" src="SERO.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-entity
        gltf-model="#boxModel"
        animation-mixer="clip: *; loop: repeat"
        position="0 90 180"
        rotation="0 0 0"
        scale="0.05 0.05 0.05"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
