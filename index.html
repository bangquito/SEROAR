<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>MindAR Box</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

  <script>
    AFRAME.registerComponent('keep-on-found', {
      init: function () {
        const el = this.el;

        el.addEventListener('targetFound', function () {
          // Show and keep visible
          el.setAttribute('visible', true);
        });

        el.addEventListener('targetLost', function () {
          // Do NOT hide — this is what keeps it on screen
          // el.setAttribute('visible', false); <-- default behavior we're overriding
        });
      }
    });
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }
    body {
      position: relative;
    }
    .example-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .scanning {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="example-container">
    <div class="scanning" id="scanHint">Point camera at the target image</div>
    <a-scene
      mindar-image="imageTargetSrc: target.mind; autoStart: true; uiScanning: true; uiLoading: true;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <a-asset-item id="boxModel" src="SERO.glb"></a-asset-item>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" keep-on-found>
        <a-entity
          gltf-model="#boxModel"
          animation-mixer="clip: *; loop: repeat"
          position="0 0 0"
          rotation="-90 0 180"
          scale="0.1 0.1 0.1"
        ></a-entity>
      </a-entity>
    </a-scene>
  </div>

  <script>
    // Hide the scan hint once target is found
    const target = document.querySelector('[mindar-image-target]');
    const hint = document.getElementById('scanHint');

    target.addEventListener('targetFound', () => {
      hint.style.display = 'none';
    });
  </script>
</body>
</html>
