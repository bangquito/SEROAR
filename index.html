<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>AR.js Hiro Marker</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .example-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }

    a-scene {
      position: fixed !important;
      inset: 0;
      width: 100vw !important;
      height: 100dvh !important;
    }

    .scanning {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="example-container">
    <div class="scanning">Point camera at the Hiro marker</div>

    <a-scene
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; colorManagement: true;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-assets>
        <a-asset-item id="boxModel" src="SERO.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity
          gltf-model="#boxModel"
          animation-mixer="clip: *; loop: repeat"
          position="0 0 0"
          rotation="0 90 0"
          scale="0.05 0.05 0.05"
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </div>
</body>
</html>
