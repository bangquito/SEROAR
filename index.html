<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>MindAR Box</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

  <script>
    AFRAME.registerComponent("sticky-anchor", {
      init: function () {
        this.targetEl = document.querySelector("#imageTarget");
        this.trackerEl = document.querySelector("#tracker");
        this.scanHint = document.getElementById("scanHint");

        this.isTracking = false;

        this.worldPos = new THREE.Vector3();
        this.worldQuat = new THREE.Quaternion();
        this.worldScale = new THREE.Vector3();

        this.targetEl.addEventListener("targetFound", () => {
          this.isTracking = true;
          if (this.scanHint) this.scanHint.style.display = "none";
          this.el.object3D.visible = true;
        });

        this.targetEl.addEventListener("targetLost", () => {
          this.isTracking = false;
          this.el.object3D.visible = true;
        });

        this.el.object3D.visible = false;
      },

      tick: function () {
        if (!this.isTracking) return;

        const source = this.trackerEl.object3D;
        const dest = this.el.object3D;

        source.updateWorldMatrix(true, false);

        source.getWorldPosition(this.worldPos);
        source.getWorldQuaternion(this.worldQuat);
        source.getWorldScale(this.worldScale);

        dest.position.copy(this.worldPos);
        dest.quaternion.copy(this.worldQuat);
        dest.scale.copy(this.worldScale);
      }
    });
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }
    .example-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    .scanning {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="example-container">
    <div class="scanning" id="scanHint">Point camera at the target image</div>

    <a-scene
      mindar-image="imageTargetSrc: target.mind; autoStart: true; uiScanning: true; uiLoading: true;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <a-asset-item id="boxModel" src="SERO.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Persistent anchor -->
      <a-entity id="worldAnchor" sticky-anchor>
        <a-entity
          gltf-model="#boxModel"
          animation-mixer="clip: *; loop: repeat"
          position="0 0 0"
          rotation="-90 0 180"
          scale="0.1 0.1 0.1"
        ></a-entity>
      </a-entity>

      <!-- MindAR tracked target -->
      <a-entity id="imageTarget" mindar-image-target="targetIndex: 0">
        <a-entity
          id="tracker"
          position="0 0 0"
          rotation="-90 0 180"
          scale="0.1 0.1 0.1"
        ></a-entity>
      </a-entity>
    </a-scene>
  </div>
</body>
</html>
